[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/angebot"
  to = "/.netlify/functions/angebot"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
